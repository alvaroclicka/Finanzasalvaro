<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  background:#080c14;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Fondo animado con partículas */
.bg-particles{position:fixed;inset:0;z-index:0;pointer-events:none}
canvas#particles{position:absolute;inset:0;width:100%;height:100%}

/* Contenido */
.portal{position:relative;z-index:10;text-align:center;padding:24px}
.portal-title{
  font-size:clamp(28px,6vw,52px);font-weight:900;letter-spacing:-2px;
  color:#fff;margin-bottom:8px;
  text-shadow:0 0 40px rgba(79,142,247,0.4);
}
.portal-sub{font-size:clamp(13px,2vw,16px);color:#6b7599;margin-bottom:48px;letter-spacing:.5px}

/* Cards */
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.card{
  position:relative;width:280px;height:340px;border-radius:24px;
  cursor:pointer;overflow:hidden;border:1px solid rgba(255,255,255,0.08);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
  text-decoration:none;display:block;
}
.card:hover{transform:translateY(-12px) scale(1.02);box-shadow:0 30px 60px rgba(0,0,0,0.5)}
.card-bg{position:absolute;inset:0;transition:transform .5s}
.card:hover .card-bg{transform:scale(1.08)}

/* Card Finanzas */
.card-finanzas .card-bg{background:linear-gradient(145deg,#0d1f3c 0%,#1a3a6e 50%,#0d2d5e 100%)}
.card-finanzas::before{
  content:'';position:absolute;inset:0;z-index:1;
  background:radial-gradient(circle at 30% 70%, rgba(79,142,247,0.25) 0%, transparent 60%);
}

/* Card Fútbol */
.card-futbol .card-bg{background:linear-gradient(145deg,#0d2010 0%,#1a4a20 50%,#0d3010 100%)}
.card-futbol::before{
  content:'';position:absolute;inset:0;z-index:1;
  background:radial-gradient(circle at 70% 30%, rgba(46,204,138,0.25) 0%, transparent 60%);
}

.card-content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px}
.card-icon{font-size:72px;line-height:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4));transition:transform .3s}
.card:hover .card-icon{transform:scale(1.15) rotate(-5deg)}
.card-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
.card-desc{font-size:13px;color:rgba(255,255,255,0.55);text-align:center;line-height:1.5}
.card-arrow{
  margin-top:8px;width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .3s;
}
.card-finanzas .card-arrow{background:rgba(79,142,247,0.2);color:#4f8ef7}
.card-futbol .card-arrow{background:rgba(46,204,138,0.2);color:#2ecc8a}
.card:hover .card-arrow{transform:translateX(6px)}

/* Animación flotante de iconos de fondo */
.float-icons{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fi{position:absolute;font-size:28px;opacity:0.06;animation:floatUp linear infinite}
@keyframes floatUp{
  0%{transform:translateY(110%) rotate(0deg);opacity:0}
  10%{opacity:0.06}
  90%{opacity:0.06}
  100%{transform:translateY(-110%) rotate(360deg);opacity:0}
}

/* Hora */
#portal-clock{
  position:fixed;top:20px;right:24px;
  font-size:13px;color:#4b5680;font-variant-numeric:tabular-nums;z-index:20;
}

@media(max-width:640px){
  .cards{flex-direction:column;align-items:center}
  .card{width:85vw;height:280px}
  .card-icon{font-size:56px}
}
</style>
</head>
<body>

<div id="portal-clock"></div>

<canvas id="particles"></canvas>

<div class="portal">
  <div class="portal-title">Mi Portal</div>
  <div class="portal-sub">Elige una sección para empezar</div>

  <div class="cards">
    <!-- Finanzas -->
    <a class="card card-finanzas" href="finanzas/index.html">
      <div class="card-bg"></div>
      <div class="float-icons" id="fi-finanzas"></div>
      <div class="card-content">
        <div class="card-icon">💳</div>
        <div class="card-name">Finanzas</div>
        <div class="card-desc">Saldo, movimientos, gráficos y control de tus gastos e ingresos</div>
        <div class="card-arrow">→</div>
      </div>
    </a>

    <!-- Fútbol -->
    <a class="card card-futbol" href="futbol/index.html">
      <div class="card-bg"></div>
      <div class="float-icons" id="fi-futbol"></div>
      <div class="card-content">
        <div class="card-icon">⚽</div>
        <div class="card-name">Fútbol</div>
        <div class="card-desc">Armario, partidos vistos y calendario completo del Leganés</div>
        <div class="card-arrow">→</div>
      </div>
    </a>
  </div>
</div>

<script>
// ── Reloj Madrid ──
function updateClock(){
  const fmt = new Intl.DateTimeFormat('es-ES',{
    timeZone:'Europe/Madrid',weekday:'short',day:'2-digit',month:'2-digit',
    year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
  });
  const parts = fmt.formatToParts(new Date());
  const g = t => parts.find(p=>p.type===t)?.value||'';
  let wd=g('weekday'); wd=wd.charAt(0).toUpperCase()+wd.slice(1).replace('.','');
  document.getElementById('portal-clock').textContent=`${wd} ${g('day')}/${g('month')}/${g('year')} · ${g('hour')}:${g('minute')}:${g('second')}`;
}
updateClock(); setInterval(updateClock,1000);

// ── Iconos flotantes ──
const finEmojis=['💶','💵','📊','💰','📈','💳','🏦','💎'];
const futEmojis=['⚽','🥅','👟','🏆','🎽','📋','🔵','⚡'];
function spawnFloats(containerId, emojis){
  const el=document.getElementById(containerId);
  setInterval(()=>{
    const span=document.createElement('span');
    span.className='fi';
    span.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left=Math.random()*90+'%';
    span.style.animationDuration=(6+Math.random()*6)+'s';
    span.style.animationDelay='0s';
    el.appendChild(span);
    setTimeout(()=>span.remove(),13000);
  },700);
}
spawnFloats('fi-finanzas',finEmojis);
spawnFloats('fi-futbol',futEmojis);

// ── Partículas de fondo ──
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize(); window.addEventListener('resize',resize);
for(let i=0;i<80;i++) pts.push({
  x:Math.random()*2000,y:Math.random()*2000,
  vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
  r:Math.random()*1.5+.5,a:Math.random()
});
function drawParticles(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(79,142,247,${p.a*0.4})`;ctx.fill();
  });
  // Líneas entre partículas cercanas
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){
      ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(79,142,247,${(1-d/120)*0.08})`;ctx.lineWidth=.5;ctx.stroke();
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
